repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: uv run ruff check --fix --unsafe-fixes
        language: system
        types: [python]
        pass_filenames: false
        always_run: true

      - id: ruff-format
        name: ruff-format
        entry: uv run ruff format
        language: system
        types: [python]
        pass_filenames: false
        always_run: true

      - id: ty
        name: ty check
        entry: uv run ty check .
        language: system
        types: [python]
        pass_filenames: false
        always_run: true

      - id: tach
        name: tach check
        entry: uv run tach check
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
